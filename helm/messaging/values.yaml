replicaCount: 1

image:
  repository: badrkhafif98/chat-messaging
  tag: latest
  pullPolicy: Never

service:
  port: 3003

env:
  PORT: "3003"
  DATABASE_URL: "postgresql://user:password@postgres:5432/chat_db"
  REDIS_URL: "redis://redis:6379"
  RABBITMQ_URL: "amqp://user:password@rabbitmq:5672"
  AUTH_SERVICE_URL: "http://auth:3001"

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"
