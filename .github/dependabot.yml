# Dependabot : mises à jour automatiques des dépendances npm
# Scan hebdomadaire des packages auth, profiles, messaging, front
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/services/auth"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/services/messaging"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/services/profiles"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/front"
    schedule:
      interval: "weekly"

