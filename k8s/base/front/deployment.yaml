# Deployment du front React (build Vite + Nginx)
# Sert l'interface utilisateur sur le port 80
apiVersion: apps/v1
kind: Deployment
metadata:
  name: front
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: front
  template:
    metadata:
      labels:
        app: front
    spec:
      imagePullSecrets:
        - name: dockerhub-credentials
      containers:
        - name: front
          image: badrkhafif98/chat-front:latest
          imagePullPolicy: Never
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 80
