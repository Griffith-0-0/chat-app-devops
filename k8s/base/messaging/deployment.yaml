# Deployment du service Messaging sur Kubernetes
# Chat temps réel (Socket.io), historique REST, RabbitMQ pour les événements
apiVersion: apps/v1
kind: Deployment
metadata:
  name: messaging
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: messaging
  template:
    metadata:
      labels:
        app: messaging
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      imagePullSecrets:
        - name: dockerhub-credentials
      containers:
        - name: messaging
          image: badrkhafif98/chat-messaging:latest
          imagePullPolicy: Never
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          ports:
            - containerPort: 3003
          envFrom:
            - configMapRef:
                name: messaging-config
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
