# Deployment du service Profiles sur Kubernetes
# CRUD profils (display_name, avatar, status), appelle le service Auth pour vérifier les tokens
apiVersion: apps/v1
kind: Deployment
metadata:
  name: profiles
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: profiles
  template:
    metadata:
      labels:
        app: profiles
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      imagePullSecrets:
        - name: dockerhub-credentials
      containers:
        - name: profiles
          image: badrkhafif98/chat-profiles:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: profiles-config
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
