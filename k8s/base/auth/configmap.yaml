# ConfigMap Auth : variables d'environnement non sensibles
# Les credentials et DATABASE_URL sont dans app-secrets.
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-config
  namespace: chat-app
data:
  PORT: "3001"
  REDIS_URL: "redis://redis:6379"
  JWT_EXPIRES_IN: "15m"
  JWT_REFRESH_EXPIRES_IN: "7d"
