# Configuration Nginx : reverse proxy / API Gateway pour la Chat App
# Routes : /api/auth/, /api/profiles/, /api/messages/, /socket.io/ (WebSocket), / (front)
events {
  worker_connections 1024;
}

http {
  upstream auth {
    server auth:3001;
  }

  upstream profiles {
    server profiles:3002;
  }

  upstream messaging {
    server messaging:3003;
  }

  server {
    listen 80;

    location /api/auth/ {
      proxy_pass http://auth/auth/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/profiles/ {
      proxy_pass http://profiles/profiles/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/messages/ {
      proxy_pass http://messaging/messages/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /socket.io/ {
      proxy_pass http://messaging/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location / {
      proxy_pass http://front:80;
    }
  }
}